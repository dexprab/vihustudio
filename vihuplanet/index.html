<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VihuPlanet</title>

<!-- Handwritten + rounded typography — bundled locally. -->
<link rel="stylesheet" href="assets/fonts/fonts.css">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="animations/motion.css">
<link rel="stylesheet" href="css/scene.css">
<link rel="stylesheet" href="hero/hero.css">
<link rel="stylesheet" href="planets/planets.css">
<link rel="stylesheet" href="dreamingPlanet/dreamingPlanet.css">
</head>
<body>

<!-- Paper backdrop — SVG grain filter stamped over the whole page so
     the world reads as sketchbook paper. -->
<svg class="paper-grain" aria-hidden="true">
  <defs>
    <filter id="paperGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.42
                             0 0 0 0 0.32
                             0 0 0 0 0.22
                             0 0 0 0.10 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#paperGrain)"/>
</svg>

<!-- The single-viewport world. Four layers preserved from Chapter 1.
     Chapter 2 adds the storyteller planets + the Dreaming Planet
     inside .foreground so Chapter 1's .sky / .ground stay
     completely untouched (canon: "The Chapter 1 world remains
     untouched"). -->
<main class="world">

  <section class="sky" aria-hidden="true">
    <div class="watercolor-sky"></div>
  </section>

  <section class="ground" aria-hidden="true">
    <div class="watercolor-ground"></div>
  </section>

  <!-- Foreground — Chapter 2 planets + Dreaming Planet live here. -->
  <section class="foreground">
    <div class="planets-host"          data-planets-host          aria-hidden="true"></div>
    <div class="dreaming-planet-host"  data-dreaming-planet-host  aria-label="Dreaming Planet"></div>
  </section>

  <header class="brand">
    <span class="brand-dot">✿</span>
    <span class="brand-word">VihuPlanet</span>
    <span class="brand-underline"></span>
  </header>

  <a class="parents-entry" href="#" role="button">
    <span class="parents-glyph" aria-hidden="true">👨</span>
    <span class="parents-label">Parents</span>
  </a>

  <section class="hero" aria-live="polite">
    <p class="hero-prompt" data-hero-prompt hidden>
      Who&rsquo;s creating today?
    </p>
    <span class="hero-underline" data-hero-underline aria-hidden="true">
      <span class="hero-underline-line"></span>
      <svg class="hero-underline-star" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5 L13 11 L19 12 L13 13 L12 19 L11 13 L5 12 L11 11 Z"
              fill="#E8B871" stroke="#1E2842" stroke-width="1.1" stroke-linejoin="round"/>
      </svg>
      <span class="hero-underline-line"></span>
    </span>
  </section>

</main>

<!-- Load order:
     MEP-01 World Library:
       0. WorldLibrary provider     — shared/worldLibrary.js
     Chapter 1:
       1. WorldObject.register()   — shared/worldObject.js
       2. Chapter 1 registry       — js/registry.js
     Placeholder services (interfaces only):
       3. RecognitionService / CompanionService / PlanetService
     Chapter 2 storyteller planets:
       4. Planet.register()        — planets/planets.js
       5. Chapter 2 planet data    — planets/planetsData.js
     Chapter 2 Dreaming Planet:
       6. DreamingPlanet.register() — dreamingPlanet/dreamingPlanet.js
       7. DreamingPlanetManager     — dreamingPlanet/dreamingPlanetManager.js
     Scene bootstrap (last):
       8. js/scene.js
-->
<script src="artDirection/illustrationRules.js"></script>
<script src="shared/worldLibrary.js"></script>
<script src="shared/worldObject.js"></script>
<script src="js/registry.js"></script>
<script src="shared/services/RecognitionService.js"></script>
<script src="shared/services/CompanionService.js"></script>
<script src="shared/services/PlanetService.js"></script>
<script src="planets/planets.js"></script>
<script src="planets/planetsData.js"></script>
<script src="dreamingPlanet/dreamingPlanet.js"></script>
<script src="dreamingPlanet/dreamingPlanetManager.js"></script>
<script src="js/scene.js"></script>
</body>
</html>
