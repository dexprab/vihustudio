<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" role="img" aria-label="Meera's planet">
  <defs>
    <radialGradient id="mrGrass" cx="45%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#C9C09A"/>
      <stop offset="100%" stop-color="#A48A5E"/>
    </radialGradient>
    <radialGradient id="mrEarth" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B08240"/>
      <stop offset="100%" stop-color="#7A5426"/>
    </radialGradient>
    <radialGradient id="mrHalo" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#EBB47A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EBB47A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="110" cy="160" r="98" fill="url(#mrHalo)"/>

  <!-- Landmass — a tilted meadow, higher on the right. Underside
       shows dry earth and one hanging root. -->
  <path d="M28 176
           q0 -12 6 -18
           q2 -20 20 -22
           q4 -20 26 -20
           q30 -14 46 -6
           q22 -6 34 14
           q22 4 22 24
           q4 20 -8 26
           q-4 14 -22 14
           q-12 12 -26 10
           q-22 8 -46 -4
           q-24 4 -38 -6
           q-18 -2 -20 -14
           q-4 -4 6 -8 z"
        fill="url(#mrGrass)" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Underside earth wash + hanging root -->
  <path d="M52 194 q22 8 62 4 q30 -4 48 0 q-2 8 -18 12 q-30 6 -60 -2 q-20 -4 -32 -14 z"
        fill="url(#mrEarth)" opacity="0.6"/>
  <path d="M120 208 q4 12 2 20" fill="none" stroke="#1E2842" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>

  <!-- Warm painted horizon line inside the meadow -->
  <path d="M50 156 q40 -14 78 -6 q28 6 44 -4" fill="none" stroke="#8E7CB0" stroke-width="1.4" opacity="0.55"/>

  <!-- Easel at the top of the slope — three wooden legs + a canvas -->
  <path d="M132 100 l 4 44" stroke="#1E2842" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M148 100 l -4 44" stroke="#1E2842" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M140 100 l 0 48" stroke="#1E2842" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
  <rect x="126" y="88"  width="30" height="24" fill="#F6E9C2" stroke="#1E2842" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- A single warm brush stroke on the canvas -->
  <path d="M132 102 q6 -6 14 0" fill="none" stroke="#EBB47A" stroke-width="2" stroke-linecap="round"/>
  <path d="M132 106 q6 -3 14 3" fill="none" stroke="#8E7CB0" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>

  <!-- The fox — SEEN FROM BEHIND, standing at the easel, painting.
       We see her back, tail curling to the side, tips of her ears. -->
  <!-- Body -->
  <path d="M104 140 q4 -18 18 -18 q14 0 18 18 l -6 12 l -24 0 z"
        fill="#E4A455" stroke="#1E2842" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Tail arcing away to the left with a white tip -->
  <path d="M104 140 q-14 -6 -22 6 q4 4 12 2 q6 -2 10 -4 z"
        fill="#E4A455" stroke="#1E2842" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M82 148 q6 -2 10 0" fill="#F1EAD0" stroke="#1E2842" stroke-width="1.1"/>
  <!-- Ears — tips just visible above the shoulders -->
  <path d="M112 122 l -1 -8 l 5 5 z" fill="#E4A455" stroke="#1E2842" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M132 122 l  1 -8 l -5 5 z" fill="#E4A455" stroke="#1E2842" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- One small hint of a paw raising a brush -->
  <path d="M132 128 q4 -6 12 -8" fill="none" stroke="#1E2842" stroke-width="1.3" stroke-linecap="round"/>
</svg>
