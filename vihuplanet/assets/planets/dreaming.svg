<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" role="img" aria-label="Dreaming Planet">
  <defs>
    <radialGradient id="dpLand" cx="45%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#B2A3D0"/>
      <stop offset="100%" stop-color="#6B5A94"/>
    </radialGradient>
    <radialGradient id="dpMist" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#F1EAD0" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#F1EAD0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F1EAD0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dpHalo" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#8E7CB0" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8E7CB0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Wide soft dreaming halo -->
  <circle cx="130" cy="180" r="130" fill="url(#dpHalo)"/>

  <!-- Landmass — a taller island silhouette, mostly hidden. The
       companion lives inside a small dwelling somewhere in the fog. -->
  <path d="M32 200
           q0 -18 10 -22
           q4 -22 24 -22
           q10 -22 30 -22
           q30 -14 50 -8
           q26 -6 40 12
           q28 4 30 30
           q6 24 -12 30
           q-10 14 -26 14
           q-16 12 -34 10
           q-26 10 -50 -2
           q-24 8 -40 -4
           q-20 -2 -22 -16
           q-4 -4 0 -12 z"
        fill="url(#dpLand)" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round" opacity="0.92"/>

  <!-- Small dwelling nestled into the peak — one warm window
       glowing through the fog. The dwelling itself is barely
       visible; only the window's warmth reads clearly. -->
  <g class="dp-dwelling">
    <path d="M108 150 l 0 -20 l 14 -12 l 14 12 l 0 20 z"
          fill="#5C4B7A" stroke="#1E2842" stroke-width="1.4" stroke-linejoin="round" opacity="0.85"/>
    <!-- The single warm window (visible in every state) -->
    <rect class="dp-window" x="116" y="132" width="12" height="12" fill="#E8B871" stroke="#1E2842" stroke-width="1.2"/>
    <rect class="dp-window-frame" x="116" y="132" width="12" height="12" fill="none" stroke="#1E2842" stroke-width="1.2"/>
    <path d="M116 138 l 12 0" stroke="#1E2842" stroke-width="1" opacity="0.7"/>
    <path d="M122 132 l 0 12" stroke="#1E2842" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- The companion — a small silhouette behind the window,
       barely visible. Multiple state groups let the wake sequence
       reveal them slowly. All state groups start invisible except
       .dp-silhouette (a faint outline seen through the pane). -->
  <g class="dp-companion" transform="translate(122 140)">
    <!-- Sleeping — just a rounded shape asleep near the window -->
    <g class="dp-eyes-sleeping">
      <ellipse cx="0" cy="0" rx="4" ry="3" fill="#5C4B7A" opacity="0.9"/>
      <path d="M-2 -1 q2 -1 4 0" stroke="#1E2842" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Stirring — small movement -->
    <g class="dp-eyes-stirring">
      <ellipse cx="0" cy="-1" rx="4" ry="3" fill="#B2A3D0" stroke="#1E2842" stroke-width="0.8"/>
      <path d="M-2 -2 q2 -1 4 0" stroke="#1E2842" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Open — sitting up, looking OUT the window at the Explorer -->
    <g class="dp-eyes-open">
      <ellipse cx="0" cy="-2" rx="4.5" ry="4" fill="#B2A3D0" stroke="#1E2842" stroke-width="0.9"/>
      <circle cx="-1.5" cy="-2.5" r="0.9" fill="#1E2842"/>
      <circle cx=" 1.5" cy="-2.5" r="0.9" fill="#1E2842"/>
    </g>
    <!-- Sleep / yawn / smile mouth placeholders — kept as ink dots
         so the composition doesn't turn cartoony. -->
    <ellipse class="dp-mouth-sleeping" cx="0" cy="2" rx="0.8" ry="0.6" fill="#1E2842"/>
    <ellipse class="dp-mouth-yawn"     cx="0" cy="2" rx="1.4" ry="1.2" fill="#1E2842"/>
    <path    class="dp-mouth-smile"    d="M-2 2 q2 2 4 0" fill="none" stroke="#1E2842" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Mist wrapping the whole planet — the reason the companion is
       barely visible. Multiple soft cream ellipses stacked at
       different opacities. -->
  <ellipse cx="60"  cy="176" rx="60" ry="30" fill="url(#dpMist)" opacity="0.85"/>
  <ellipse cx="200" cy="192" rx="60" ry="26" fill="url(#dpMist)" opacity="0.72"/>
  <ellipse cx="130" cy="230" rx="90" ry="26" fill="url(#dpMist)" opacity="0.85"/>
  <ellipse cx="150" cy="122" rx="46" ry="18" fill="url(#dpMist)" opacity="0.65"/>
</svg>
