<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Emma's planet">
  <defs>
    <radialGradient id="emBody" cx="42%" cy="42%" r="65%">
      <stop offset="0%"  stop-color="#C1EFDD"/>
      <stop offset="55%" stop-color="#5FC0A0"/>
      <stop offset="100%" stop-color="#2F7C68"/>
    </radialGradient>
    <radialGradient id="emHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#C1EFDD" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C1EFDD" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="140" r="80" fill="url(#emHalo)"/>
  <circle cx="100" cy="140" r="62" fill="url(#emBody)" stroke="#1D3457" stroke-width="2.2"/>
  <!-- Iceberg patches -->
  <path d="M56 132 q10 -12 24 -4 q10 6 -4 12 z"  fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4" stroke-linejoin="round" opacity="0.75"/>
  <path d="M118 128 q8 -8 22 -4 q6 6 -6 10 z"    fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4" stroke-linejoin="round" opacity="0.75"/>
  <path d="M76 170 q28 -8 60 4"  fill="none" stroke="#2F7C68" stroke-width="1.6" opacity="0.4"/>
  <!-- Music note by the planet -->
  <path d="M156 116 l0 -14 q6 0 6 4 q0 4 -3 6 l0 4 q3 0 3 3 q0 4 -6 4 q-2 0 -2 -2 z" fill="#F4D79A" stroke="#1D3457" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Penguin companion on top -->
  <!-- Body -->
  <path d="M100 92 q0 -22 20 -22 q20 0 20 22 q0 12 -10 18 l -20 0 q -10 -6 -10 -18 z"
        fill="#1D3457" stroke="#1D3457" stroke-width="2" stroke-linejoin="round"/>
  <!-- White belly -->
  <path d="M108 90 q12 8 24 0 q-4 20 -12 20 q-8 0 -12 -20 z" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Head - joined to body -->
  <ellipse cx="120" cy="76" rx="18" ry="14" fill="#1D3457"/>
  <path d="M108 76 q12 8 24 0" fill="#FFFFFF"/>
  <!-- Eyes -->
  <circle cx="114" cy="73" r="2.8" fill="#FFFFFF"/>
  <circle cx="126" cy="73" r="2.8" fill="#FFFFFF"/>
  <circle cx="114" cy="73" r="1.6" fill="#1D3457"/>
  <circle cx="126" cy="73" r="1.6" fill="#1D3457"/>
  <!-- Beak -->
  <path d="M116 80 l4 4 l4 -4 l-4 -2 z" fill="#F0A060" stroke="#1D3457" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Feet -->
  <ellipse cx="112" cy="108" rx="5" ry="2" fill="#F0A060" stroke="#1D3457" stroke-width="1.2"/>
  <ellipse cx="128" cy="108" rx="5" ry="2" fill="#F0A060" stroke="#1D3457" stroke-width="1.2"/>
</svg>
