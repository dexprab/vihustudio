<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Aarav's planet">
  <defs>
    <radialGradient id="arBody" cx="42%" cy="42%" r="65%">
      <stop offset="0%"  stop-color="#BFE1FF"/>
      <stop offset="55%" stop-color="#5FB3FF"/>
      <stop offset="100%" stop-color="#255CA0"/>
    </radialGradient>
    <radialGradient id="arHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#BFE1FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#BFE1FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="140" r="80" fill="url(#arHalo)"/>
  <circle cx="100" cy="140" r="62" fill="url(#arBody)" stroke="#1D3457" stroke-width="2.2"/>
  <!-- Cloud bands -->
  <path d="M52 138 q26 -8 52 4 q26 12 44 -8" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M60 162 q30 -4 68 6" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <!-- Small stars orbiting the planet edge -->
  <path d="M50 108 l 2 4 l 4 -2 l -2 4 l 2 4 l -4 -2 l -2 4 l -2 -4 l -4 2 l 2 -4 l -2 -4 l 4 2 z" fill="#F4D79A" opacity="0.9"/>
  <path d="M158 130 l 2 3 l 3 -1 l -1 3 l 1 3 l -3 -1 l -2 3 l -1 -3 l -3 1 l 1 -3 l -1 -3 l 3 1 z" fill="#F4D79A" opacity="0.9"/>

  <!-- Blue baby dragon companion on top -->
  <!-- Body -->
  <path d="M96 92 q0 -22 22 -22 q22 0 22 22 q0 12 -11 18 l -22 0 q -11 -6 -11 -18 z"
        fill="#7BB9F0" stroke="#1D3457" stroke-width="2" stroke-linejoin="round"/>
  <!-- Belly -->
  <path d="M108 96 q10 8 22 0 q-2 12 -11 12 q-9 0 -11 -12 z" fill="#DDEEFF"/>
  <!-- Cheek fins -->
  <path d="M96 82 q-6 -2 -6 -12 q4 4 6 12 z" fill="#5B99D8" stroke="#1D3457" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M140 82 q6 -2 6 -12 q-4 4 -6 12 z" fill="#5B99D8" stroke="#1D3457" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="113" cy="74" r="4" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.6"/>
  <circle cx="127" cy="74" r="4" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.6"/>
  <circle cx="114" cy="74" r="2" fill="#1D3457"/>
  <circle cx="128" cy="74" r="2" fill="#1D3457"/>
  <!-- Smile -->
  <path d="M114 84 q6 5 12 0" fill="none" stroke="#1D3457" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Little horn -->
  <path d="M118 60 q4 -8 6 0 z" fill="#F4D79A" stroke="#1D3457" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
