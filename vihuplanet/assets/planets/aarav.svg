<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" role="img" aria-label="Aarav's planet">
  <defs>
    <radialGradient id="arGrass" cx="45%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#A9C1AE"/>
      <stop offset="100%" stop-color="#6E9080"/>
    </radialGradient>
    <radialGradient id="arEarth" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C6A56"/>
      <stop offset="100%" stop-color="#4C4030"/>
    </radialGradient>
    <radialGradient id="arHalo" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#7EB1CE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7EB1CE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="110" cy="160" r="98" fill="url(#arHalo)"/>

  <!-- Landmass — a low rounded island, wider than tall. A small
       gentle hill rises on the right. -->
  <path d="M28 178
           q0 -12 8 -18
           q4 -18 22 -20
           q10 -18 30 -18
           q28 -12 44 -4
           q22 -6 32 12
           q26 4 22 26
           q4 20 -10 24
           q-8 12 -22 10
           q-14 12 -30 8
           q-24 8 -46 -2
           q-22 6 -36 -4
           q-16 -2 -18 -14
           q-4 -4 4 -8 z"
        fill="url(#arGrass)" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Underside earth -->
  <path d="M50 194 q22 6 62 4 q30 -4 46 0 q-2 8 -18 12 q-30 4 -60 -2 q-20 -4 -30 -14 z"
        fill="url(#arEarth)" opacity="0.55"/>

  <!-- Sparse grass strokes across the top -->
  <g stroke="#1E2842" stroke-width="1.2" fill="none" opacity="0.55">
    <path d="M58 168 l 0 -4"/>
    <path d="M76 166 l 0 -4"/>
    <path d="M96 164 l 0 -5"/>
    <path d="M112 162 l 0 -5"/>
    <path d="M148 164 l 0 -4"/>
  </g>

  <!-- Lone tree on the right rise — trunk + a single soft canopy. -->
  <path d="M148 154 l 0 -34" stroke="#4C4030" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M126 118
           q6 -22 22 -22
           q16 0 22 22
           q-4 8 -12 8
           q-4 4 -10 0
           q-4 4 -10 0
           q-8 0 -12 -8 z"
        fill="#6E9080" stroke="#1E2842" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Faint painted leaf hint -->
  <path d="M132 108 q6 4 12 0" fill="none" stroke="#1E2842" stroke-width="1.1" opacity="0.5"/>

  <!-- The little dragon — SEEN IN PROFILE from behind, at the base
       of the tree, looking up at the sky. Small body, back to the
       viewer, tail relaxed on the grass. -->
  <path d="M96 152 q0 -14 12 -14 q12 0 12 14 l -4 8 l -16 0 z"
        fill="#7EB1CE" stroke="#1E2842" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Tail curling out behind -->
  <path d="M96 156 q-10 4 -12 12 q4 2 12 -6 z"
        fill="#7EB1CE" stroke="#1E2842" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Small crest at the back of the head -->
  <path d="M104 140 l -2 -4 l 4 0 z" fill="#EBB47A" stroke="#1E2842" stroke-width="1.1"/>
  <!-- One eye just visible in profile — looking up -->
  <circle cx="118" cy="142" r="1.4" fill="#1E2842"/>
</svg>
