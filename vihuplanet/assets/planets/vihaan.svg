<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" role="img" aria-label="Vihaan's planet">
  <defs>
    <radialGradient id="vhGrass" cx="45%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#B7CBA6"/>
      <stop offset="100%" stop-color="#7C9C6F"/>
    </radialGradient>
    <radialGradient id="vhRock" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#8E7CB0"/>
      <stop offset="100%" stop-color="#5C4B7A"/>
    </radialGradient>
    <radialGradient id="vhHalo" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#F1EAD0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F1EAD0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft cream halo — the island holds a small warmth. -->
  <circle cx="110" cy="160" r="98" fill="url(#vhHalo)"/>

  <!-- The floating landmass silhouette — top of a mountain lifted
       from a wider base, no clean sphere. Undercut roots hint at
       what's beneath the surface. -->
  <path d="M32 178
           q-6 -22 6 -28
           q4 -18 22 -20
           q10 -22 32 -18
           q26 -8 40 8
           q22 0 32 20
           q20 4 22 22
           q4 20 -6 26
           q-8 12 -22 12
           q-6 14 -22 14
           q-24 6 -46 -2
           q-24 6 -40 -8
           q-16 0 -20 -14
           q-8 -6 2 -12 z"
        fill="url(#vhGrass)" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Rocky mountain rising from the landmass surface. -->
  <path d="M74 168
           l 24 -76
           l 20 30
           l 12 -14
           l 18 60 z"
        fill="url(#vhRock)" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Snow cap -->
  <path d="M98 92 l 8 -18 l 8 12 l 8 -6 l 12 22 z"
        fill="#F1EAD0" stroke="#1E2842" stroke-width="1.3" stroke-linejoin="round" opacity="0.9"/>

  <!-- Cottage at the base — a warm window in an otherwise cold peak. -->
  <path d="M46 178 l 0 -18 l 10 -10 l 10 10 l 0 18 z"
        fill="#EBB47A" stroke="#1E2842" stroke-width="1.4" stroke-linejoin="round"/>
  <rect x="52" y="164" width="8" height="10" fill="#E4A455" stroke="#1E2842" stroke-width="1.1"/>
  <!-- Cottage window glowing warm -->
  <rect x="54" y="167" width="4" height="4" fill="#F6E9C2"/>
  <!-- Chimney -->
  <rect x="62" y="150" width="3" height="5" fill="#1E2842" opacity="0.7"/>

  <!-- The dragon — SEEN FROM BEHIND at the summit of the peak,
       watching the sky. Small; the planet is a PLACE, not a stage. -->
  <!-- Tail curling down to the right -->
  <path d="M108 92 q6 4 10 12 q-6 4 -10 -6 z"
        fill="#7C9C6F" stroke="#1E2842" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Body seen from behind -->
  <path d="M100 78 q4 -10 12 -10 q10 0 12 10 l -2 12 l -22 0 z"
        fill="#7C9C6F" stroke="#1E2842" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Wings — partly folded, seen edge-on from behind -->
  <path d="M104 76 q-6 -6 -8 -14 q6 4 10 10 z"
        fill="#5C7C51" stroke="#1E2842" stroke-width="1.2" stroke-linejoin="round" opacity="0.9"/>
  <path d="M118 76 q6 -6 8 -14 q-6 4 -10 10 z"
        fill="#5C7C51" stroke="#1E2842" stroke-width="1.2" stroke-linejoin="round" opacity="0.9"/>
  <!-- Small horns pointing up -->
  <path d="M106 68 l -1 -5" stroke="#1E2842" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M118 68 l 1 -5" stroke="#1E2842" stroke-width="1.2" stroke-linecap="round"/>
</svg>
