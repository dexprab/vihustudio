<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="Moon">
  <defs>
    <filter id="moonGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="moonBody" cx="42%" cy="40%" r="62%">
      <stop offset="0%"   stop-color="#F6E9C2"/>
      <stop offset="55%"  stop-color="#E8B871"/>
      <stop offset="100%" stop-color="#C08F44"/>
    </radialGradient>
  </defs>

  <!-- Soft candle-warm halo. -->
  <circle cx="80" cy="80" r="72" fill="#E8B871" opacity="0.14" filter="url(#moonGlow)"/>

  <!-- Body — painted, no face. -->
  <circle cx="80" cy="80" r="54"
          fill="url(#moonBody)" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Crescent shadow on the far side. -->
  <path d="M80 26 a54 54 0 0 0 -34 90 a42 42 0 0 1 34 -90 z"
        fill="#C08F44" opacity="0.42"/>

  <!-- Three craters — deliberately off any face grid.
       Never symmetrical, never at "eye" or "mouth" positions. -->
  <ellipse cx="108" cy="52" rx="4"   ry="2.2" fill="#B08240" opacity="0.5"
           transform="rotate(-18 108 52)"/>
  <ellipse cx="54"  cy="66" rx="3.5" ry="2"   fill="#B08240" opacity="0.45"
           transform="rotate(24 54 66)"/>
  <ellipse cx="92"  cy="118" rx="5"  ry="2.6" fill="#B08240" opacity="0.4"
           transform="rotate(-8 92 118)"/>
</svg>
