<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="Moon">
  <defs>
    <filter id="moonGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="moonBody" cx="45%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FFF0C7"/>
      <stop offset="55%" stop-color="#F4D79A"/>
      <stop offset="100%" stop-color="#E8BC71"/>
    </radialGradient>
  </defs>

  <!-- Soft peach halo -->
  <circle cx="80" cy="80" r="70" fill="#F4D79A" opacity="0.20" filter="url(#moonGlow)"/>

  <!-- Body -->
  <circle cx="80" cy="80" r="56" fill="url(#moonBody)" stroke="#1D3457" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- Sleeping eyes -->
  <path d="M55 76 q6 -8 12 0" fill="none" stroke="#1D3457" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M93 76 q6 -8 12 0" fill="none" stroke="#1D3457" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Lashes -->
  <path d="M55 76 l-3 -3" stroke="#1D3457" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M67 76 l3 -3" stroke="#1D3457" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M93 76 l-3 -3" stroke="#1D3457" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M105 76 l3 -3" stroke="#1D3457" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <circle cx="55" cy="92" r="7" fill="#F4A9A0" opacity="0.85"/>
  <circle cx="105" cy="92" r="7" fill="#F4A9A0" opacity="0.85"/>

  <!-- Smile -->
  <path d="M68 96 q12 10 24 0" fill="none" stroke="#1D3457" stroke-width="3" stroke-linecap="round"/>
</svg>
