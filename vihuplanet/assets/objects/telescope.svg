<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180" role="img" aria-label="Telescope">
  <!-- Ground shadow — softer, ink-tinted -->
  <ellipse cx="70" cy="170" rx="36" ry="4" fill="#1E2842" opacity="0.15"/>

  <!-- Tripod legs — pencil ink -->
  <path d="M74 96 L86 168" stroke="#1E2842" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M62 96 L34 168" stroke="#1E2842" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M70 96 L70 168" stroke="#1E2842" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Tripod cross-braces -->
  <path d="M46 140 q24 -8 48 0" stroke="#1E2842" stroke-width="1.4" fill="none" opacity="0.5"/>

  <!-- Telescope tube — ember gold, muted -->
  <g transform="rotate(-28 68 82)">
    <rect x="16" y="70" width="108" height="30" rx="14"
          fill="#E4A455" stroke="#1E2842" stroke-width="2"/>
    <!-- eyepiece -->
    <rect x="8" y="76" width="14" height="18" rx="3"
          fill="#1E2842" opacity="0.85"/>
    <!-- lens hood — cerulean glass. Hero MEP Final Polish: a brief
         lens-glint (animations/motion.css) catches the light every
         ~27s — the only thing on the telescope that ever moves; the
         body itself stays grounded and still. -->
    <ellipse class="lens-glint" cx="124" cy="85" rx="6" ry="16"
             fill="#7EB1CE" stroke="#1E2842" stroke-width="1.8"/>
    <!-- pencil hatch -->
    <path d="M30 82 q30 -4 60 0" stroke="#1E2842" stroke-width="1.2" fill="none" opacity="0.45"/>
    <path d="M30 92 q30 -4 60 0" stroke="#1E2842" stroke-width="1.2" fill="none" opacity="0.45"/>
    <!-- focus knob — candle warm -->
    <circle cx="70" cy="102" r="4"
            fill="#E8B871" stroke="#1E2842" stroke-width="1.4"/>
  </g>

  <!-- Small twinkle beside the eyepiece — a hint, not a call -->
  <text x="16" y="60" font-family="Kalam, cursive" font-size="14"
        fill="#E8B871" opacity="0.78">✧</text>
</svg>
