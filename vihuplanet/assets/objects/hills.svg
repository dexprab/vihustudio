<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Rolling hills">
  <!-- Back hill — meadow-moss under warm apricot horizon glow -->
  <path d="M0 210
           Q 200 150 420 200
           T 820 230
           T 1220 190
           T 1600 220
           L 1600 500 L 0 500 Z"
        fill="#B7CBA6" stroke="#1E2842" stroke-width="1.6" stroke-linejoin="round" opacity="0.9"/>

  <!-- Front hill — deeper meadow moss -->
  <path d="M0 320
           Q 180 260 400 320
           T 800 340
           T 1200 300
           T 1600 340
           L 1600 500 L 0 500 Z"
        fill="#7C9C6F" stroke="#1E2842" stroke-width="1.8" stroke-linejoin="round"/>

