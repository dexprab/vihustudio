<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 60" role="img" aria-label="Wild flower">
  <!-- Stem -->
  <path d="M20 60 Q 22 42 20 24" fill="none" stroke="#1D3457" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M20 42 q -6 -2 -8 -8 q 8 0 8 8 z" fill="#9CCFA6" stroke="#1D3457" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Petals (five) -->
  <ellipse cx="20" cy="12" rx="4" ry="6" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4"/>
  <ellipse cx="27" cy="18" rx="4" ry="6" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4" transform="rotate(60 27 18)"/>
  <ellipse cx="24" cy="28" rx="4" ry="6" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4" transform="rotate(120 24 28)"/>
  <ellipse cx="16" cy="28" rx="4" ry="6" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4" transform="rotate(-120 16 28)"/>
  <ellipse cx="13" cy="18" rx="4" ry="6" fill="#FFFFFF" stroke="#1D3457" stroke-width="1.4" transform="rotate(-60 13 18)"/>
  <!-- Centre -->
  <circle cx="20" cy="20" r="3" fill="#F4D79A" stroke="#1D3457" stroke-width="1.4"/>
</svg>
