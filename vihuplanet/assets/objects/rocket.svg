<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 140" role="img" aria-label="Rocket">
  <!-- Flame tail — warm candle over ember gold, muted -->
  <path d="M32 96 q8 26 16 0 q-4 16 -8 18 q-4 -2 -8 -18 z"
        fill="#E8B871" stroke="#1E2842" stroke-width="1.4" stroke-linejoin="round" opacity="0.88"/>
  <path d="M35 100 q5 16 10 0 q-2 10 -5 12 q-3 -2 -5 -12 z"
        fill="#E4A455" opacity="0.9"/>

  <!-- Body — ember gold, softer than the v0.3 orange -->
  <path d="M40 8
           q18 16 18 46
           v34
           l-8 8
           l-20 0
           l-8 -8
           v-34
           q0 -30 18 -46 z"
        fill="#E4A455" stroke="#1E2842" stroke-width="2" stroke-linejoin="round"/>

  <!-- Window — cerulean glass -->
  <circle cx="40" cy="52" r="10" fill="#7EB1CE" stroke="#1E2842" stroke-width="1.8"/>
  <circle cx="37" cy="49" r="3" fill="#DDE7EE" opacity="0.8"/>

  <!-- Fins — deeper ember -->
  <path d="M22 78 l-12 22 l14 -6 z" fill="#C08E44" stroke="#1E2842" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M58 78 l12 22 l-14 -6 z" fill="#C08E44" stroke="#1E2842" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Body stripe -->
  <path d="M32 78 q8 4 16 0" stroke="#1E2842" stroke-width="1.2" fill="none" opacity="0.5"/>
</svg>
