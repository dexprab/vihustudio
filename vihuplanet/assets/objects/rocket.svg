<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 140" role="img" aria-label="Rocket">
  <!-- Flame tail -->
  <path d="M32 96 q8 26 16 0 q-4 16 -8 18 q-4 -2 -8 -18 z"
        fill="#FFB366" stroke="#1D3457" stroke-width="1.6" stroke-linejoin="round" opacity="0.95"/>
  <path d="M35 100 q5 16 10 0 q-2 10 -5 12 q-3 -2 -5 -12 z"
        fill="#EF6F3A" opacity="0.95"/>

  <!-- Body — warm orange -->
  <path d="M40 8
           q18 16 18 46
           v34
           l-8 8
           l-20 0
           l-8 -8
           v-34
           q0 -30 18 -46 z"
        fill="#FFB366" stroke="#1D3457" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- Window -->
  <circle cx="40" cy="52" r="10" fill="#DDEAF6" stroke="#1D3457" stroke-width="2.4"/>
  <circle cx="37" cy="49" r="3.2" fill="#FFFFFF" opacity="0.8"/>

  <!-- Fins -->
  <path d="M22 78 l-12 22 l14 -6 z" fill="#EF6F3A" stroke="#1D3457" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M58 78 l12 22 l-14 -6 z" fill="#EF6F3A" stroke="#1D3457" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Body stripe -->
  <path d="M32 78 q8 4 16 0" stroke="#1D3457" stroke-width="1.4" fill="none" opacity="0.55"/>
</svg>
