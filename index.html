<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>VihuStudio v0.3.0</title>
<link rel='stylesheet' href='css/style.css'>
</head>
<body>
<!-- GitHub connector update test -->
<header><h1>Vihu<span>Studio</span></h1></header>
<div id='app'>
<aside class='sidebar'>
<button id='uploadBtn'>📂 Upload Images</button>
<input id='scanUpload' type='file' accept='image/*' multiple hidden>
<button id='coverBtn'>+ Cover</button>
<button id='ctaBtn'>+ CTA</button>
<button id='duplicateBtn'>⎘ Duplicate</button>
<button id='deleteBtn'>✕ Delete</button>
<button id='blankBtn'>+ Blank</button>
<div id='slideList'></div>
</aside>
<main class='preview'><canvas id='previewCanvas'></canvas></main>
<aside class='props'><label>Book Title</label><input id='bookTitle' value='The Worst Birthday Ever'><label>Story Beat</label><textarea id='storyBeat'></textarea><label>Page</label><input id='pageNumber' value='1'><label>Total Pages</label><input id='totalPages' value='0' readonly></aside>
</div>

<!-- Development footer (populated from build-info.json; hidden by adding .hidden) -->
<div id="devFooter" class="dev-footer">VihuStudio • Development</div>

<script src='js/state.js'></script><script src='renderer/slideRenderer.js'></script><script src='js/buildInfo.js'></script><script src='js/thumbnails.js'></script><script src='js/pageOps.js'></script><script src='js/app.js'></script>
</body>
</html>
